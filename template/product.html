<!Doctype HTML>
<html>
    <head>
        <title>Amazona Application</title>
        <link rel="stylesheet" href="css/styles.css"/>
        <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous"/>
    </head>
    <body>
        <div class="grid-container">
            <header class="row">
                <div>
                    <a class="brand" href="#">Amazona</a>
                </div>
                <div>
                    <a href="cart.html">Cart</a>
                    <a href="signIn.html">Sign In</a>
                </div>
            </header>
            <main>
                <div class="row top">          
                    <div class="col-2">
                        <img class="large" src="images/p3.jpg" alt ="New Quality Product" />
                    </div>
                    <div class="col-1">
                        <ul>
                            <li class="productName">Lacoste Slim Pants</li>
                            <li class="rating">
                                <span><i class="fa fa-star"></i></span>
                                <span><i class="fa fa-star"></i></span>
                                <span><i class="fa fa-star"></i></span>
                                <span><i class="fa fa-star"></i></span>
                                <span><i class="fa fa-star"></i></span>
                            </li>
                            <li>Price: $ 120</li>
                            <li>Description:</li>
                            <li>This is a great product.</li>
                        </ul>
                    </div>
                    <div class="col-1">
                        <div class="card card-body">
                            <ul>
                                <li class="row">
                                    <div>Price</div>
                                    <div>$ 120</div>
                                </li>
                                <li class="row">
                                    <div>Status</div>
                                    <div>In Stock</div>
                                </li>
                                <li>
                                    <button class="block primary" type="button">Add to Cart</button>
                                </li>
                            </ul> 
                        </div>
                                              
                    </div>
                </div>            
            </main>
            <footer class="row center">
                All rights reserved
            </footer>
        </div>
        
    </body>
</html>
